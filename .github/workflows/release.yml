name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            os_name: darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            os_name: windows-x86_64
    env:
      TAG_NAME: ${{ github.ref_name }}
      OS_NAME: ${{ matrix.os_name }}
      CARGO_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target "$CARGO_TARGET"

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${TAG_NAME#v}"
          mkdir -p dist
          cp "target/${CARGO_TARGET}/release/glc" dist/
          tar -czf "glc-${VERSION}-${OS_NAME}.tar.gz" -C dist glc

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          VERSION="${TAG_NAME#v}"
          mkdir -p dist
          cp "target/${CARGO_TARGET}/release/glc.exe" dist/
          7z a "glc-${VERSION}-${OS_NAME}.zip" ./dist/glc.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: glc-${{ matrix.os_name }}
          path: |
            glc-*.tar.gz
            glc-*.zip

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG_NAME" dist/* \
            --latest \
            --title "glc ${TAG_NAME#v}" \
            --notes "Automated release for ${TAG_NAME}."

      - name: Update Homebrew tap
        env:
          TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_BRANCH: ${{ secrets.HOMEBREW_TAP_BRANCH }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_REPO:-}" ] || [ -z "${TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_REPO and HOMEBREW_TAP_TOKEN secrets are required" >&2
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          MACOS_ARTIFACT="dist/glc-${VERSION}-darwin-aarch64.tar.gz"
          SHA256=$(sha256sum "$MACOS_ARTIFACT" | cut -d' ' -f1)
          BRANCH="${TAP_BRANCH:-main}"

          git clone --depth=1 --branch "$BRANCH" \
            "https://${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap-repo

          {
            echo "class Glc < Formula"
            echo "  desc \"Git history file viewer - TUI for exploring files from git history\""
            echo "  homepage \"https://github.com/soomtong/gluck\""
            echo "  url \"https://github.com/soomtong/gluck/releases/download/${TAG_NAME}/glc-${VERSION}-darwin-aarch64.tar.gz\""
            echo "  version \"${VERSION}\""
            echo "  sha256 \"${SHA256}\""
            echo "  license \"MIT\""
            echo ""
            echo "  def install"
            echo "    bin.install \"glc\""
            echo "  end"
            echo ""
            echo "  test do"
            echo "    system \"#{bin}/glc\", \"--help\""
            echo "  end"
            echo "end"
          } > tap-repo/Formula/glc.rb

          cd tap-repo
          git config user.name "gluck-bot"
          git config user.email "gluck@users.noreply.github.com"
          git add Formula/glc.rb
          if git diff --cached --quiet; then
            echo "Tap already up to date."
            exit 0
          fi
          git commit -m "Update glc to ${TAG_NAME}"
          git push origin "$BRANCH"
