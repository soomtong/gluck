name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            os_name: darwin-aarch64
          - target: x86_64-apple-darwin
            runner: macos-13
            os_name: darwin-x86_64
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            os_name: linux-x86_64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            os_name: linux-aarch64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os_name: windows-x86_64
    env:
      TAG_NAME: ${{ github.ref_name }}
      OS_NAME: ${{ matrix.os_name }}
      CARGO_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          if [[ "$CARGO_TARGET" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Configure cross-compilation (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-gnu-gcc"
EOF

      - name: Build
        run: cargo build --release --locked --target "$CARGO_TARGET"

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${TAG_NAME#v}"
          mkdir -p dist
          cp "target/${CARGO_TARGET}/release/glc" dist/
          tar -czf "glc-${VERSION}-${OS_NAME}.tar.gz" -C dist glc

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${TAG_NAME#v}"
          mkdir -p dist
          cp "target/${CARGO_TARGET}/release/glc.exe" dist/
          7z a "glc-${VERSION}-${OS_NAME}.zip" ./dist/glc.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glc-${{ matrix.os_name }}
          path: |
            glc-*.tar.gz
            glc-*.zip

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG_NAME" dist/* \
            --latest \
            --title "glc ${TAG_NAME#v}" \
            --notes "Automated release for ${TAG_NAME}."

      - name: Update Homebrew tap
        env:
          TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_BRANCH: ${{ secrets.HOMEBREW_TAP_BRANCH }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_REPO:-}" ] || [ -z "${TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_REPO and HOMEBREW_TAP_TOKEN secrets are required" >&2
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          MACOS_ARTIFACT="dist/glc-${VERSION}-darwin-aarch64.tar.gz"
          SHA256=$(sha256sum "$MACOS_ARTIFACT" | cut -d' ' -f1)
          BRANCH="${TAP_BRANCH:-main}"

          git clone --depth=1 --branch "$BRANCH" \
            "https://${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap-repo

          cat > tap-repo/Formula/glc.rb << EOF
class Glc < Formula
  desc "Git history file viewer - TUI for exploring files from git history"
  homepage "https://github.com/soomtong/gluck"
  url "https://github.com/soomtong/gluck/releases/download/${TAG_NAME}/glc-${VERSION}-darwin-aarch64.tar.gz"
  version "${VERSION}"
  sha256 "${SHA256}"
  license "MIT"

  def install
    bin.install "glc"
  end

  test do
    system "#{bin}/glc", "--help"
  end
end
EOF

          cd tap-repo
          git config user.name "gluck-bot"
          git config user.email "gluck@users.noreply.github.com"
          git add Formula/glc.rb
          if git diff --cached --quiet; then
            echo "Tap already up to date."
            exit 0
          fi
          git commit -m "Update glc to ${TAG_NAME}"
          git push origin "$BRANCH"
